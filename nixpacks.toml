# nixpacks.toml — Nixpacks build configuration for Railway backend deployment.
#
# Without this file, Nixpacks auto-detects requirements.txt which installs the
# full CUDA torch wheel (~3.5 GB) and pushes the image over Railway's 4 GB limit.
# This file tells Nixpacks to use requirements-backend.txt instead, which pins
# torch to the CPU-only build (~800 MB) keeping the total image under 2 GB.

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install --no-cache-dir -r requirements-backend.txt",
]
